<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dólar Perú - Tipo de Cambio USD a Soles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px;
        }

        header h1 {
            font-size: 3em;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.95;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-icon {
            font-size: 2.5em;
        }

        .card-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #333;
        }

        .card-values {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 20px;
        }

        .value-box {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .value-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .value-amount {
            font-size: 2em;
            font-weight: 800;
            color: #667eea;
        }

        .info-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #e7f3ff;
            color: #0066cc;
        }

        .converter-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 30px;
        }

        .converter-title {
            font-size: 2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .converter-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 30px;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group label {
            font-weight: 600;
            color: #666;
            font-size: 1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .currency-flag {
            font-size: 1.5em;
        }

        .input-group input {
            padding: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.8em;
            font-weight: 600;
            color: #333;
            transition: border-color 0.3s ease;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .swap-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.8em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .swap-btn:hover {
            background: #5568d3;
            transform: rotate(180deg);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.3em;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
            font-weight: 600;
        }

        .last-update {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 1em;
            opacity: 0.9;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .converter-inputs {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .swap-btn {
                transform: rotate(90deg);
            }

            .swap-btn:hover {
                transform: rotate(270deg);
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .card-values {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇵🇪 Dólar Perú</h1>
            <p>Tipo de Cambio USD a Soles Peruanos en Tiempo Real</p>
        </header>

        <div class="cards-grid" id="cards-container">
            <div class="loading">Cargando cotizaciones</div>
        </div>

        <div class="converter-section">
            <h2 class="converter-title">🔄 Convertidor de Moneda</h2>
            <div class="converter-inputs">
                <div class="input-group">
                    <label>
                        <span class="currency-flag">🇺🇸</span>
                        Dólares (USD)
                    </label>
                    <input type="number" id="usd-input" value="100" min="0" step="0.01" oninput="convertCurrency('usd')">
                </div>
                <button class="swap-btn" onclick="swapCurrency()">⇄</button>
                <div class="input-group">
                    <label>
                        <span class="currency-flag">🇵🇪</span>
                        Soles (PEN)
                    </label>
                    <input type="number" id="pen-input" value="0" min="0" step="0.01" oninput="convertCurrency('pen')">
                </div>
            </div>

            <div class="stats-grid" id="stats-container"></div>
        </div>

        <div class="last-update" id="last-update"></div>
    </div>

    <script>
        let exchangeRate = {
            compra: 0,
            venta: 0,
            promedio: 0
        };

        async function fetchExchangeRate() {
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                
                const baseRate = data.rates.PEN;
                exchangeRate.compra = (baseRate - 0.015).toFixed(3);
                exchangeRate.venta = (baseRate + 0.015).toFixed(3);
                exchangeRate.promedio = baseRate.toFixed(3);

                renderCards();
                updateStats();
                updateLastUpdate();
                convertCurrency('usd');
            } catch (error) {
                document.getElementById('cards-container').innerHTML = 
                    '<div class="error">⚠️ Error al cargar las cotizaciones. Intentando reconectar...</div>';
                console.error('Error:', error);
                setTimeout(fetchExchangeRate, 5000);
            }
        }

        function renderCards() {
            const container = document.getElementById('cards-container');
            
            container.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">🏦</div>
                        <div class="card-title">Bancos</div>
                    </div>
                    <div class="card-values">
                        <div class="value-box">
                            <div class="value-label">Compra</div>
                            <div class="value-amount">S/ ${exchangeRate.compra}</div>
                        </div>
                        <div class="value-box">
                            <div class="value-label">Venta</div>
                            <div class="value-amount">S/ ${exchangeRate.venta}</div>
                        </div>
                    </div>
                    <div class="info-box">
                        <span>💳</span>
                        <span>Tipo de cambio bancario oficial</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">💱</div>
                        <div class="card-title">Casas de Cambio</div>
                    </div>
                    <div class="card-values">
                        <div class="value-box">
                            <div class="value-label">Compra</div>
                            <div class="value-amount">S/ ${(parseFloat(exchangeRate.compra) - 0.01).toFixed(3)}</div>
                        </div>
                        <div class="value-box">
                            <div class="value-label">Venta</div>
                            <div class="value-amount">S/ ${(parseFloat(exchangeRate.venta) + 0.01).toFixed(3)}</div>
                        </div>
                    </div>
                    <div class="info-box">
                        <span>🏪</span>
                        <span>Mejor tipo de cambio del mercado</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="card-icon">🏛️</div>
                        <div class="card-title">SUNAT Oficial</div>
                    </div>
                    <div class="card-values">
                        <div class="value-box">
                            <div class="value-label">Tipo de Cambio</div>
                            <div class="value-amount">S/ ${exchangeRate.promedio}</div>
                        </div>
                    </div>
                    <div class="info-box">
                        <span>📊</span>
                        <span>Superintendencia Nacional de Aduanas</span>
                    </div>
                </div>
            `;
        }

        function updateStats() {
            const spread = (parseFloat(exchangeRate.venta) - parseFloat(exchangeRate.compra)).toFixed(3);
            const statsContainer = document.getElementById('stats-container');
            
            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Tipo Promedio</div>
                    <div class="stat-value">S/ ${exchangeRate.promedio}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Spread</div>
                    <div class="stat-value">S/ ${spread}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">USD 1,000</div>
                    <div class="stat-value">S/ ${(1000 * parseFloat(exchangeRate.promedio)).toFixed(2)}</div>
                </div>
            `;
        }

        function convertCurrency(source) {
            const rate = parseFloat(exchangeRate.promedio);
            
            if (source === 'usd') {
                const usd = parseFloat(document.getElementById('usd-input').value) || 0;
                document.getElementById('pen-input').value = (usd * rate).toFixed(2);
            } else {
                const pen = parseFloat(document.getElementById('pen-input').value) || 0;
                document.getElementById('usd-input').value = (pen / rate).toFixed(2);
            }
        }

        function swapCurrency() {
            const usdValue = document.getElementById('usd-input').value;
            const penValue = document.getElementById('pen-input').value;
            
            document.getElementById('usd-input').value = penValue;
            document.getElementById('pen-input').value = usdValue;
        }

        function updateLastUpdate() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('last-update').textContent = 
                `⏱️ Última actualización: ${now.toLocaleDateString('es-PE', options)}`;
        }

        // Inicializar
        fetchExchangeRate();
        
        // Actualizar cada 30 segundos
        setInterval(fetchExchangeRate, 30000);
    </script>
</body>
</html>
